blueprint:
  name: "Smart Pool Filtering"
  description: >
    Calculates a daily target filtration duration from the water temperature
    (formula: temperature / coefficient), then distributes it over N cycles
    spread evenly across a configurable time window [window_start, window_end].

    The number of cycles is auto-adjusted to respect per-cycle min/max duration
    constraints. A polling mechanism checks every X minutes whether the pump
    should be running (inside a cycle) or stopped (between cycles or outside
    the window), and acts accordingly.

    A calculated duration is written to an input_number helper once per day
    (at calc_time). It can be manually adjusted before the window opens.

    An external event trigger (configurable event type) forces an immediate
    recalculation and cycle re-evaluation at any time.

    **Prerequisites before using this blueprint:**

    1. Any sensor returning the water temperature with device_class temperature
       (raw sensor, statistics mean, template sensor…).

    2. An **input_number** helper that stores the target filtration duration.
       The unit (min, h or s) is auto-detected from the helper.

    3. A **pump state sensor** (switch, input_boolean, binary_sensor or sensor)
       whose state is `on` when the pump is running.

    4. A **start action** and a **stop action** (script, scene, turn_on/off…)
       that start and stop the filtration pump. Both should be idempotent.

  domain: automation
  author: "Arnaud Masciotra"
  homeassistant:
    min_version: "2024.8.0"
  source_url: https://github.com/ozirissp/ha-blueprint-smart-pool-filtering/blob/main/smart_pool_filtering.yaml

  input:

    # --- Sensors -----------------------------------------------------------------

    temperature_sensor:
      name: "Water temperature sensor"
      description: >
        Sensor returning the current water temperature. This can be a raw
        temperature sensor, a statistics sensor (mean), a template sensor, or
        any entity with device_class temperature.
      selector:
        entity:
          domain: sensor
          device_class: temperature

    pump_state_sensor:
      name: "Pump state sensor"
      description: >
        Entity whose state is `on` when the pump is running. Used to avoid
        calling start/stop actions unnecessarily at every poll cycle.
        Typically a switch, input_boolean, binary_sensor or sensor.
      selector:
        entity:
          domain:
            - switch
            - input_boolean
            - binary_sensor
            - sensor

    # --- Output ------------------------------------------------------------------

    duration_input_number:
      name: "Target duration input_number"
      description: >
        input_number entity where the blueprint writes the calculated target
        filtration duration. The unit is auto-detected from the helper
        (supported: min, h, s — default: min). You can manually adjust this
        value between calc_time and the start of the filtration window.
      selector:
        entity:
          domain: input_number

    # --- Actions -----------------------------------------------------------------

    start_action:
      name: "Start filtration action"
      description: >
        Action(s) executed to start the filtration pump
        (turn on a switch, call a script, activate a scene…).
        Must be idempotent (safe to call when pump is already running).
      selector:
        action: {}

    stop_action:
      name: "Stop filtration action"
      description: >
        Action(s) executed to stop the filtration pump
        (turn off a switch, call a script, activate a scene…).
        Must be idempotent (safe to call when pump is already stopped).
      selector:
        action: {}

    # --- Schedule ----------------------------------------------------------------

    calc_time:
      name: "Daily calculation time"
      description: >
        Time at which the blueprint calculates the target filtration duration
        and writes it to the input_number. Should be set before window_start.
      default: "06:00:00"
      selector:
        time: {}

    window_start:
      name: "Filtration window start"
      description: >
        Start of the daily filtration window. The first cycle begins at this time.
      default: "08:00:00"
      selector:
        time: {}

    window_end:
      name: "Filtration window end"
      description: >
        End of the daily filtration window. The last cycle ends at this time.
        Must be on the same day as window_start.
      default: "20:00:00"
      selector:
        time: {}

    poll_interval_minutes:
      name: "Verification interval (minutes)"
      description: >
        Frequency at which the blueprint checks whether the pump should be
        running or stopped based on the current cycle schedule.
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: min
          mode: slider

    # --- Cycle parameters --------------------------------------------------------

    cycles_count:
      name: "Number of cycles"
      description: >
        Desired number of filtration cycles per day. The blueprint distributes
        the total filtration duration evenly across cycles, separated by equal
        pauses. The actual number of cycles may be auto-adjusted to respect the
        per-cycle min/max duration constraints.
      default: 2
      selector:
        number:
          min: 1
          max: 6
          step: 1
          mode: slider

    min_cycle_minutes:
      name: "Minimum cycle duration (minutes)"
      description: >
        If the calculated duration per cycle falls below this value, the number
        of cycles is reduced until each cycle meets this minimum.
      default: 60
      selector:
        number:
          min: 15
          max: 360
          step: 15
          unit_of_measurement: min
          mode: slider

    max_cycle_minutes:
      name: "Maximum cycle duration (minutes)"
      description: >
        If the calculated duration per cycle exceeds this value, the number of
        cycles is increased until each cycle meets this maximum.
      default: 240
      selector:
        number:
          min: 30
          max: 720
          step: 15
          unit_of_measurement: min
          mode: slider

    # --- Calculation parameters --------------------------------------------------

    filter_coefficient:
      name: "Filtration coefficient"
      description: >
        Divisor applied to the temperature to calculate the total duration.
        Formula: duration_hours = temperature / coefficient.
        Standard value: 3 (one-third rule).
      default: 3
      selector:
        number:
          min: 1
          max: 10
          step: 0.5
          unit_of_measurement: "°C/h"
          mode: slider

    # --- External trigger --------------------------------------------------------

    external_event_type:
      name: "External trigger event type"
      description: >
        Custom HA event type that forces an immediate recalculation and
        cycle re-evaluation. Fire it from another automation or script:

        action: event.fire
        data:
          event_type: smart_pool_filtering_run

        Change this value if you run multiple instances of this blueprint
        (use a unique event type per instance).
      default: "smart_pool_filtering_run"
      selector:
        text: {}

# --- Automation --------------------------------------------------------------

mode: single
max_exceeded: silent

trigger:
  # Daily calculation: compute target duration and write to input_number.
  - platform: time
    at: !input calc_time
    id: calc

  # Regular polling: check every minute, filtered by poll_interval_minutes.
  - platform: time_pattern
    minutes: "/1"
    id: poll

  # Resume after HA restart: re-evaluate immediately.
  - platform: homeassistant
    event: start
    id: poll

  # External trigger: force recalculation + immediate re-evaluation.
  - platform: event
    event_type: !input external_event_type
    id: external

variables:
  temperature_sensor:   !input temperature_sensor
  pump_state_sensor:    !input pump_state_sensor
  duration_input_number: !input duration_input_number
  poll_interval_minutes: !input poll_interval_minutes
  filter_coefficient:   !input filter_coefficient
  cycles_count:         !input cycles_count
  min_cycle_minutes:    !input min_cycle_minutes
  max_cycle_minutes:    !input max_cycle_minutes

  # Current water temperature (defaults to 0 if sensor unavailable).
  current_temp: >
    {{ states(temperature_sensor) | float(default=0) }}

  # Total filtration duration in minutes (raw, no global clamp).
  calculated_duration_minutes: >
    {% set coeff = filter_coefficient | float(default=3) %}
    {% set temp  = current_temp | float(default=0) %}
    {{ ((temp / coeff * 60) if coeff > 0 else 0) | round(0) | int }}

  # Unit declared on the input_number helper (min / h / s). Fallback: min.
  input_number_unit: >
    {{ state_attr(duration_input_number, 'unit_of_measurement') | default('min') | lower }}

  # Value to WRITE into the input_number: internal minutes → target unit.
  calculated_duration_output: >
    {% set v = calculated_duration_minutes | float(default=0) %}
    {{ (v / 60)  | round(2)         if input_number_unit == 'h' else
       (v * 60)  | round(0) | int   if input_number_unit == 's' else
        v        | round(0) | int }}

  # Value READ from the input_number, converted back to internal minutes.
  target_duration_minutes: >
    {% set raw = states(duration_input_number) | float(default=0) %}
    {{ (raw * 60) if input_number_unit == 'h' else
       (raw / 60) if input_number_unit == 's' else
        raw }}

  # Window boundaries in minutes since midnight.
  window_start_min: >
    {% set t = today_at(!input window_start) %}
    {{ t.hour * 60 + t.minute }}

  window_end_min: >
    {% set t = today_at(!input window_end) %}
    {{ t.hour * 60 + t.minute }}

  # Cycle schedule: compute N and build the list of [start, end] slots.
  # All values in minutes since midnight.
  # Returns a list of dicts: [{start: X, end: Y}, ...]
  cycle_slots: >
    {% set total   = target_duration_minutes | float(default=0) %}
    {% set ws      = window_start_min | float(default=480) %}
    {% set we      = window_end_min   | float(default=1200) %}
    {% set window  = we - ws %}
    {% set mn      = min_cycle_minutes | float(default=60) %}
    {% set mx      = max_cycle_minutes | float(default=240) %}
    {% set n_want  = cycles_count | int(default=2) %}

    {# Edge case: zero or negative total → no cycles #}
    {% if total <= 0 or window <= 0 %}
      {{ [] }}
    {% elif total >= window %}
      {# Filtration fills (or exceeds) the whole window → single full-window cycle #}
      {{ [{'start': ws | round(1), 'end': we | round(1)}] }}
    {% else %}
      {# Adjust N to respect per-cycle min/max constraints #}
      {% set ns = namespace(n=n_want) %}
      {% set ns.cycle = total / ns.n %}

      {# If cycle too long → increase N (more cycles, shorter each) #}
      {% for _ in range(6) %}
        {% if ns.cycle > mx and ns.n < 6 %}
          {% set ns.n = ns.n + 1 %}
          {% set ns.cycle = total / ns.n %}
        {% endif %}
      {% endfor %}

      {# If cycle too short → decrease N (fewer cycles, longer each) #}
      {% for _ in range(6) %}
        {% if ns.cycle < mn and ns.n > 1 %}
          {% set ns.n = ns.n - 1 %}
          {% set ns.cycle = total / ns.n %}
        {% endif %}
      {% endfor %}

      {# Compute equal pauses between cycles #}
      {% set n_final = ns.n %}
      {% set cycle_dur = total / n_final %}
      {% set pause = (window - total) / (n_final - 1) if n_final > 1 else 0 %}

      {# Build slot list #}
      {% set slots = namespace(list=[]) %}
      {% for i in range(n_final) %}
        {% set s = ws + i * (cycle_dur + pause) %}
        {% set e = s + cycle_dur %}
        {% set slots.list = slots.list + [{'start': s | round(1), 'end': e | round(1)}] %}
      {% endfor %}
      {{ slots.list }}
    {% endif %}

  # True if current time falls inside any cycle slot.
  in_active_cycle: >
    {% set now_min = now().hour * 60 + now().minute %}
    {% set active = namespace(found=false) %}
    {% for slot in cycle_slots %}
      {% if slot.start <= now_min < slot.end %}
        {% set active.found = true %}
      {% endif %}
    {% endfor %}
    {{ active.found }}

  # True if the pump is currently running.
  pump_is_on: >
    {{ states(pump_state_sensor) in ['on', 'true', 'home', 'open'] }}

action:
  - choose:

      # ── Daily calculation -------------------------------------------------------
      - conditions:
          - condition: trigger
            id: calc
        sequence:
          - action: input_number.set_value
            target:
              entity_id: !input duration_input_number
            data:
              value: "{{ calculated_duration_output }}"

          - action: system_log.write
            data:
              level: info
              message: >
                [Smart Pool Filtering] Daily calculation complete.
                Temp={{ current_temp | round(1) }}°C  Coeff={{ filter_coefficient }}
                Total={{ calculated_duration_minutes }}min
                → written as {{ calculated_duration_output }}{{ input_number_unit }}
                Cycles={{ cycles_count }} (min={{ min_cycle_minutes }}min,
                max={{ max_cycle_minutes }}min).
                Adjust the input_number before the window opens if needed.

      # ── External trigger: recalculate then evaluate immediately ----------------
      - conditions:
          - condition: trigger
            id: external
        sequence:
          # Step 1 — Recalculate and write to input_number
          - action: input_number.set_value
            target:
              entity_id: !input duration_input_number
            data:
              value: "{{ calculated_duration_output }}"

          - action: system_log.write
            data:
              level: info
              message: >
                [Smart Pool Filtering] External trigger received. Recalculated:
                Temp={{ current_temp | round(1) }}°C  Coeff={{ filter_coefficient }}
                Total={{ calculated_duration_minutes }}min
                → written as {{ calculated_duration_output }}{{ input_number_unit }}.
                Evaluating cycle schedule immediately.

          # Step 2 — Immediate cycle evaluation (same logic as poll)
          - if:
              - condition: template
                value_template: "{{ in_active_cycle and not pump_is_on }}"
            then:
              - sequence: !input start_action
              - action: system_log.write
                data:
                  level: info
                  message: >
                    [Smart Pool Filtering] External trigger: inside a cycle,
                    pump was off → start_action executed.
                    Slots={{ cycle_slots }}

          - if:
              - condition: template
                value_template: "{{ not in_active_cycle and pump_is_on }}"
            then:
              - sequence: !input stop_action
              - action: system_log.write
                data:
                  level: info
                  message: >
                    [Smart Pool Filtering] External trigger: outside any cycle,
                    pump was on → stop_action executed.
                    Slots={{ cycle_slots }}

      # ── Regular polling ---------------------------------------------------------
      - conditions:
          - condition: trigger
            id: poll
          - condition: template
            value_template: >
              {% set interval = poll_interval_minutes | int(default=5) %}
              {{ interval > 0 and now().minute % interval == 0 }}
        sequence:
          - if:
              - condition: template
                value_template: "{{ in_active_cycle and not pump_is_on }}"
            then:
              - sequence: !input start_action
              - action: system_log.write
                data:
                  level: info
                  message: >
                    [Smart Pool Filtering] Poll: entering cycle window,
                    pump was off → start_action executed.
                    Slots={{ cycle_slots }}

          - if:
              - condition: template
                value_template: "{{ not in_active_cycle and pump_is_on }}"
            then:
              - sequence: !input stop_action
              - action: system_log.write
                data:
                  level: info
                  message: >
                    [Smart Pool Filtering] Poll: outside cycle window,
                    pump was on → stop_action executed.
                    Slots={{ cycle_slots }}
