blueprint:
  name: "Smart Pool Filtering"
  description: >
    Automatically calculates the daily filtration duration based on the 24h average
    water temperature (configurable divisor rule).

    Formula: `duration = temperature / coefficient`, clamped between min and max.

    Optionally, a template can return the filtration time already elapsed today
    (in minutes): if the calculated target is already reached, the automation stops
    immediately without starting the pump.

    **Prerequisites before using this blueprint:**

    1. Create a **Statistics sensor** (native HA integration) pointing to your
       temperature sensor, configured as `mean` over 24h. This is the sensor to
       select in the "Temperature sensor" field. Do not use a raw temperature sensor.

    2. Prepare a **start action** and a **stop action** (scripts, scenes, or any
       HA action) that respectively start and stop your filtration pump.

  domain: automation
  author: "Arnaud Masciotra"
  homeassistant:
    min_version: "2024.8.0"
  source_url: https://github.com/ozirissp/ha-blueprint-smart-pool-filtering/blob/main/smart_pool_filtering.yaml

  input:

    # --- Sensors -----------------------------------------------------------------

    temperature_sensor:
      name: "Temperature sensor (24h average)"
      description: >
        A HA statistics sensor configured as mean over 24h.
        Do not use a raw temperature sensor.
      selector:
        entity:
          domain: sensor
          device_class: temperature

    # --- Actions -----------------------------------------------------------------

    start_action:
      name: "Start filtration action"
      description: >
        Action(s) executed to start the filtration pump
        (turn on a switch, call a script, activate a scene…).
      selector:
        action: {}

    stop_action:
      name: "Stop filtration action"
      description: >
        Action(s) executed to stop the filtration pump
        (turn off a switch, call a script, activate a scene…).
      selector:
        action: {}

    # --- Schedule ----------------------------------------------------------------

    start_time:
      name: "Filtration start time"
      description: >
        Time at which the automation triggers each day to evaluate
        and start filtration.
      default: "10:00:00"
      selector:
        time: {}

    # --- Calculation parameters --------------------------------------------------

    filter_coefficient:
      name: "Filtration coefficient"
      description: >
        Divisor applied to the temperature to calculate the duration.
        Formula: duration = temperature / coefficient.
        Standard value: 3 (one-third rule).
      default: 3
      selector:
        number:
          min: 1
          max: 10
          step: 0.5
          unit_of_measurement: "°C/h"
          mode: slider

    min_duration_hours:
      name: "Minimum filtration duration (hours)"
      description: >
        Floor duration: filtration will never be shorter than this value,
        even if the temperature is very low or the sensor is unavailable.
      default: 2
      selector:
        number:
          min: 0
          max: 12
          step: 0.5
          unit_of_measurement: h
          mode: slider

    max_duration_hours:
      name: "Maximum filtration duration (hours)"
      description: >
        Ceiling duration: filtration will never exceed this value,
        even if the temperature is very high.
      default: 12
      selector:
        number:
          min: 1
          max: 24
          step: 0.5
          unit_of_measurement: h
          mode: slider

    # --- Optional: output — calculated duration ----------------------------------

    calculated_duration_output:
      name: "Calculated duration output (input_number, optional)"
      description: >
        An `input_number` entity in which the blueprint will write the calculated
        filtration duration (in minutes) each time it runs.

        Leave empty to disable this output.

        Create the helper beforehand via **Settings → Devices & Services → Helpers → Add helper → Number**,
        or add it to your `configuration.yaml`:

        ```yaml
        input_number:
          pool_filter_calculated_duration:
            name: "Pool filter calculated duration"
            min: 0
            max: 720
            step: 1
            unit_of_measurement: min
            icon: mdi:timer
        ```
      default: ""
      selector:
        entity:
          domain: input_number

    # --- Optional: already-filtered today ----------------------------------------

    already_filtered_today:
      name: "Already filtered today (template, optional)"
      description: >
        Jinja2 template returning the number of minutes already filtered today.
        If the calculated target duration is already reached, the automation
        stops immediately without starting the pump.

        Leave empty (or set to `0`) to always run the full calculated duration.

        Example: `{{ states('sensor.pool_filter_today_minutes') | float(0) }}`
      default: "0"
      selector:
        template: {}

# --- Automation --------------------------------------------------------------

mode: single
max_exceeded: silent

trigger:
  - platform: time
    at: !input start_time

variables:
  temperature_sensor: !input temperature_sensor
  filter_coefficient: !input filter_coefficient
  min_duration_hours: !input min_duration_hours
  max_duration_hours: !input max_duration_hours
  calculated_duration_output: !input calculated_duration_output
  # Capture the raw template string from the input so it can be evaluated below.
  already_filtered_today_tpl: !input already_filtered_today

  # Temperature read from the statistics sensor (24h mean).
  # If unavailable (unknown/unavailable), defaults to 0 → min_duration applies.
  current_temp: >
    {{ states(temperature_sensor) | float(default=0) }}

  # Duration calculated by the divisor rule, clamped between min and max.
  calculated_duration_hours: >
    {% set coeff = filter_coefficient | float(default=3) %}
    {% set raw = current_temp / coeff if coeff > 0 else 0 %}
    {% set clamped = [min_duration_hours | float(default=2),
                      [max_duration_hours | float(default=12), raw] | min] | max %}
    {{ clamped }}

  # Target duration in minutes.
  target_minutes: >
    {{ (calculated_duration_hours * 60) | round(1) }}

  # Minutes already filtered today — evaluate the user-supplied template string.
  already_filtered_minutes: >
    {{ [0, already_filtered_today_tpl | float(default=0)] | max }}

  # Remaining duration in seconds (never negative).
  remaining_seconds: >
    {% set target_s = calculated_duration_hours * 3600 %}
    {% set done_s   = already_filtered_minutes * 60 %}
    {{ [0, (target_s - done_s) | int] | max }}

condition: []

action:
  # ── Step 1: Check if daily quota is already reached ───────────────────────────
  - if:
      - condition: template
        value_template: "{{ remaining_seconds <= 0 }}"
    then:
      - stop: >
          Daily filtration quota already reached
          (target={{ target_minutes }}min, done={{ already_filtered_minutes }}min).

  # ── Step 2: Write calculated duration to output entity (if configured) ───────
  - if:
      - condition: template
        value_template: "{{ calculated_duration_output != '' }}"
    then:
      - action: input_number.set_value
        target:
          entity_id: "{{ calculated_duration_output }}"
        data:
          value: "{{ target_minutes }}"

  # ── Step 3: Start filtration ──────────────────────────────────────────────────
  - action: system_log.write
    data:
      level: info
      message: >
        [Smart Pool Filtering] Starting filtration.
        Temp={{ current_temp | round(1) }}°C  Coeff={{ filter_coefficient }}
        Target={{ target_minutes }}min  AlreadyDone={{ already_filtered_minutes }}min
        Remaining={{ (remaining_seconds / 60) | round(1) }}min

  - sequence: !input start_action

  # ── Step 4: Wait for calculated remaining duration ────────────────────────────
  - delay:
      seconds: "{{ remaining_seconds }}"

  # ── Step 5: Stop filtration ───────────────────────────────────────────────────
  - sequence: !input stop_action

  # ── Step 6: Log completion ────────────────────────────────────────────────────
  - action: system_log.write
    data:
      level: info
      message: >
        [Smart Pool Filtering] Filtration complete.
        Temp={{ current_temp | round(1) }}°C  Coeff={{ filter_coefficient }}
        Duration={{ (remaining_seconds / 60) | round(1) }}min
