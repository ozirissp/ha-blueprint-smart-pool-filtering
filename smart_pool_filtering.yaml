blueprint:
  name: "Smart Pool Filtering"
  description: >
    Calculates a daily target filtration duration from the 24h average water
    temperature, writes it to an input_number, starts filtration at a configured
    time, then checks a history sensor regularly and stops filtration when the
    target duration is reached.

    The target duration is calculated once per day at `calc_time` and can be
    manually adjusted in the input_number before filtration starts.

    **Prerequisites before using this blueprint:**

    1. Create a **Statistics sensor** (native HA integration) pointing to your
       temperature sensor, configured as `mean` over 24h. This is the sensor to
       select in the "Temperature sensor" field. Do not use a raw temperature sensor.

    2. Create an **input_number** helper that will store the target filtration
       duration in minutes.

    3. Create a **history_stats** or template sensor that returns the filtration
       duration already completed today.

    4. Prepare a **start action** and a **stop action** (scripts, scenes, or any
       HA action) that respectively start and stop your filtration pump.

  domain: automation
  author: "Arnaud Masciotra"
  homeassistant:
    min_version: "2024.8.0"
  source_url: https://github.com/ozirissp/ha-blueprint-smart-pool-filtering/blob/main/smart_pool_filtering.yaml

  input:

    # --- Sensors -----------------------------------------------------------------

    temperature_sensor:
      name: "Temperature sensor (24h average)"
      description: >
        A HA statistics sensor configured as mean over 24h.
        Do not use a raw temperature sensor.
      selector:
        entity:
          domain: sensor
          device_class: temperature

    history_sensor:
      name: "Filtered duration today sensor"
      description: >
        Sensor returning the filtration duration already completed today.
        This is typically a history_stats sensor on the pump state.
      selector:
        entity:
          domain: sensor

    history_unit:
      name: "Filtered duration sensor unit"
      description: >
        Unit returned by the filtered duration sensor. history_stats with
        `type: time` usually returns hours (`h`). If your sensor already returns
        minutes, select `min`.
      default: min
      selector:
        select:
          options:
            - label: "Minutes"
              value: min
            - label: "Hours"
              value: h

    # --- Output ------------------------------------------------------------------

    duration_input_number:
      name: "Target duration input_number"
      description: >
        input_number entity where the blueprint writes the calculated target
        filtration duration in minutes. You can manually adjust this value
        between the calculation time and the filtration start time.
      selector:
        entity:
          domain: input_number

    # --- Actions -----------------------------------------------------------------

    start_action:
      name: "Start filtration action"
      description: >
        Action(s) executed to start the filtration pump
        (turn on a switch, call a script, activate a scene…).
      selector:
        action: {}

    stop_action:
      name: "Stop filtration action"
      description: >
        Action(s) executed when the filtered duration reaches the target duration
        (turn off a switch, call a script, activate a scene…).
      selector:
        action: {}

    # --- Schedule ----------------------------------------------------------------

    calc_time:
      name: "Daily calculation time"
      description: >
        Time at which the blueprint calculates the target filtration duration and
        writes it to the input_number.
      default: "06:00:00"
      selector:
        time: {}

    start_time:
      name: "Filtration start time"
      description: >
        Time at which the blueprint executes the start action. The input_number
        value is read as-is, so it can be manually adjusted after calculation.
      default: "10:00:00"
      selector:
        time: {}

    poll_interval_minutes:
      name: "Verification interval (minutes)"
      description: >
        Frequency at which the blueprint checks whether the filtered duration has
        reached the target duration.
      default: 15
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: min
          mode: slider

    # --- Calculation parameters --------------------------------------------------

    filter_coefficient:
      name: "Filtration coefficient"
      description: >
        Divisor applied to the temperature to calculate the duration.
        Formula: duration = temperature / coefficient.
        Standard value: 3 (one-third rule).
      default: 3
      selector:
        number:
          min: 1
          max: 10
          step: 0.5
          unit_of_measurement: "°C/h"
          mode: slider

    min_duration_minutes:
      name: "Minimum filtration duration (minutes)"
      description: >
        Floor duration in minutes: filtration will never be shorter than this value,
        even if the temperature is very low or the sensor is unavailable.
      default: 120
      selector:
        number:
          min: 0
          max: 720
          step: 5
          unit_of_measurement: min
          mode: slider

    max_duration_minutes:
      name: "Maximum filtration duration (minutes)"
      description: >
        Ceiling duration in minutes: filtration will never exceed this value,
        even if the temperature is very high.
      default: 720
      selector:
        number:
          min: 5
          max: 1440
          step: 5
          unit_of_measurement: min
          mode: slider

# --- Automation --------------------------------------------------------------

mode: single
max_exceeded: silent

trigger:
  - platform: time
    at: !input calc_time
    id: calc

  - platform: time
    at: !input start_time
    id: start

  # The effective interval is controlled by poll_interval_minutes in the action.
  # This is the standard blueprint-compatible pattern for configurable polling.
  - platform: time_pattern
    minutes: "/1"
    id: poll

variables:
  temperature_sensor: !input temperature_sensor
  history_sensor: !input history_sensor
  history_unit: !input history_unit
  duration_input_number: !input duration_input_number
  poll_interval_minutes: !input poll_interval_minutes
  filter_coefficient: !input filter_coefficient
  min_duration_minutes: !input min_duration_minutes
  max_duration_minutes: !input max_duration_minutes

  current_temp: >
    {{ states(temperature_sensor) | float(default=0) }}

  # Raw duration in minutes from the temperature / coefficient rule,
  # then clamped between min and max (both in minutes).
  calculated_duration_minutes: >
    {% set coeff = filter_coefficient | float(default=3) %}
    {% set temp  = current_temp | float(default=0) %}
    {% set raw   = (temp / coeff * 60) if coeff > 0 else 0 %}
    {% set mn    = min_duration_minutes | float(default=120) %}
    {% set mx    = max_duration_minutes | float(default=720) %}
    {{ [mn, [mx, raw] | min] | max | round(0) | int }}

  target_duration_minutes: >
    {{ states(duration_input_number) | float(default=0) }}

  filtered_duration_minutes: >
    {% set raw = states(history_sensor) | float(default=0) %}
    {{ (raw * 60 if history_unit == 'h' else raw) | round(1) }}

action:
  - choose:

      # ── Daily calculation ------------------------------------------------------
      - conditions:
          - condition: trigger
            id: calc
        sequence:
          - action: input_number.set_value
            target:
              entity_id: !input duration_input_number
            data:
              value: "{{ calculated_duration_minutes }}"

          - action: system_log.write
            data:
              level: info
              message: >
                [Smart Pool Filtering] Calculated daily target duration:
                {{ calculated_duration_minutes }}min
                (temp={{ current_temp | float(default=0) | round(1) }}°C,
                coeff={{ filter_coefficient }},
                min={{ min_duration_minutes }}min,
                max={{ max_duration_minutes }}min).
                The input_number can be manually adjusted before filtration starts.

      # ── Start filtration -------------------------------------------------------
      - conditions:
          - condition: trigger
            id: start
        sequence:
          - if:
              - condition: template
                value_template: "{{ target_duration_minutes | float(default=0) <= 0 }}"
            then:
              - action: system_log.write
                data:
                  level: warning
                  message: >
                    [Smart Pool Filtering] Filtration start skipped because target
                    duration is {{ target_duration_minutes | float(default=0) | round(1) }}min.

              - stop: "Target filtration duration is zero."

          - sequence: !input start_action

          - action: system_log.write
            data:
              level: info
              message: >
                [Smart Pool Filtering] Filtration started.
                Target={{ target_duration_minutes | float(default=0) | round(1) }}min.

      # ── Regular quota verification -------------------------------------------
      - conditions:
          - condition: trigger
            id: poll
          - condition: template
            value_template: >
              {% set interval = poll_interval_minutes | int(default=15) %}
              {{ interval > 0 and now().minute % interval == 0 }}
        sequence:
          - if:
              - condition: template
                value_template: >
                  {{ target_duration_minutes | float(default=0) > 0 and
                     filtered_duration_minutes | float(default=0) >=
                     target_duration_minutes | float(default=0) }}
            then:
              - sequence: !input stop_action

              - action: system_log.write
                data:
                  level: info
                  message: >
                    [Smart Pool Filtering] Target duration reached. Stopping filtration.
                    Filtered={{ filtered_duration_minutes | float(default=0) | round(1) }}min
                    Target={{ target_duration_minutes | float(default=0) | round(1) }}min.

              - stop: "Target filtration duration reached."
